name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Compile desktop-side modules
        run: ./gradlew :rlib:compileJava :rgame:compileJava :rai:compileJava :desktop:compileJava

      - name: Run tests (rlib + rai + rgame)
        run: ./gradlew :rlib:test :rai:test :rgame:test

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/'
