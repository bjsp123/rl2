# Game-balance tunables. Read once at startup by GameBalance.load(); each key
# overrides a same-named static field on the GameBalance class. Keep the
# section grouping in sync with the Java field grouping for readability.

# ── Combat simulation ──────────────────────────────────────────────────
MOBFIGHT_DEFAULT_TRIALS = 10000

# ── Character progression ──────────────────────────────────────────────
MAX_CHARACTER_LEVEL   = 32
XP_PER_LEVEL_STEP     = 10
PERK_POINTS_PER_LEVEL = 1

# ── Combat effects ─────────────────────────────────────────────────────
# Legacy fallback magic-missile damage when no source wand carries the cast.
MAGIC_MISSILE_DAMAGE  = 3

# ── Item-level scaling ─────────────────────────────────────────────────
# Items carry a level field. Level 0 is baseline; every level above adds a
# fixed increment to the relevant stat. Player starter items are always
# level 0; dungeon-generated items roll a random level in [0, dungeonDepth].
# Food is always level 0.
BASIC_WAND_DAMAGE_MIN     = 2
BASIC_WAND_DAMAGE_MAX     = 4
WAND_DAMAGE_INCREMENT_MIN = 1
WAND_DAMAGE_INCREMENT_MAX = 2
WAND_EFFECT_TILES         = 5
WAND_EFFECT_TILE_INCREMENT = 4
BASIC_FOOD_VALUE          = 10000
ARMOR_INCREMENT_MIN       = 1
ARMOR_INCREMENT_MAX       = 1
WEAPON_INCREMENT_MIN      = 1
WEAPON_INCREMENT_MAX      = 2
BASIC_HEAL_VALUE          = 20
HEAL_VALUE_INCREMENT      = 10
BOMB_DAMAGE_BASE          = 3
BOMB_DAMAGE_INCREMENT     = 2
BOMB_EFFECT_TILES         = 5
BOMB_EFFECT_TILE_INCREMENT = 4

# ── Level dimensions / density ─────────────────────────────────────────
LEVEL_BASE_W         = 48
LEVEL_BASE_H         = 48
LEVEL_TARGET_ROOMS   = 8
LEVEL_ROOM_TOLERANCE = 2
ROOM_MIN_SIZE        = 4
ROOM_MAX_SIZE        = 10

# ── Mob population caps ────────────────────────────────────────────────
MAX_MOBS_ON_LEVEL     = 30
MAX_MOBS_FROM_SPAWNER = 8

# ── Hunger / satiety ───────────────────────────────────────────────────
STARTING_SATIETY        = 10000
STARVATION_TICKS_PER_HP = 100
