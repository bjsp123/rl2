# Game-balance tunables. Read once at startup by GameBalance.load(); each key
# overrides a same-named static field on the GameBalance class. Keep the
# section grouping in sync with the Java field grouping for readability.

# ── Combat simulation ──────────────────────────────────────────────────
MOBFIGHT_DEFAULT_TRIALS = 10000

# ── Character progression ──────────────────────────────────────────────
MAX_CHARACTER_LEVEL   = 32
XP_PER_LEVEL_STEP     = 10
PERK_POINTS_PER_LEVEL = 1
XP_PER_POWER_ORB = 10

# ── Item-level scaling ─────────────────────────────────────────────────
# Items carry a level field. Level 0 is baseline; every level above adds a
# fixed increment to the relevant stat. Per-level scaling now lives on each
# row of items.csv (damagePerLevel, armorPerLevel, tilesAffectedPerLevel) so
# new items pick their own scaling without touching this file. Food doesn't
# scale per level — only the baseline food value lives here.
BASIC_FOOD_VALUE          = 10000

# ── Level dimensions / density ─────────────────────────────────────────
LEVEL_BASE_W         = 48
LEVEL_BASE_H         = 48
LEVEL_TARGET_ROOMS   = 12
LEVEL_ROOM_TOLERANCE = 2
ROOM_MIN_SIZE        = 5
ROOM_MAX_SIZE        = 10

# -- overall world stats --
DUNGEON_DEPTH = 8
SIDE_BRANCH_PROBABILITY = 0.25
CROSSLINK_PROBABILITY = 0.25

# ── Mob population caps ────────────────────────────────────────────────
MAX_MOBS_ON_LEVEL     = 30
MAX_MOBS_FROM_SPAWNER = 8

# ── Inventory capacity (per category group) ────────────────────────
BAG_EQUIPMENT_SIZE = 20
BAG_GEMS_SIZE      = 20
BAG_FOOD_SIZE      = 20
BAG_ITEMS_SIZE     = 20

# ── Hunger / satiety ───────────────────────────────────────────────────
STARTING_SATIETY        = 10000
STARVATION_TICKS_PER_HP = 100
